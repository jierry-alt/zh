<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Eternity直连托管</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.22);
            --glass-border: rgba(255, 255, 255, 0.35);
            --accent-color: #e80860;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }

        body {
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            overflow-x: hidden;
            padding: 15px; 
            padding-top: 6vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            position: relative;
        }

        #sakuraCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
        }

        .main-layer { width: 100%; max-width: 460px; position: relative; z-index: 2; }

        .page-title {
            text-align: center; 
            font-size: 31px; 
            font-weight: 900; 
            margin-bottom: 12px;
            color: #ffffff !important;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.3);
        }

        .avatar-img {
            width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
            display: block; margin: 0 auto 18px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 4px solid rgba(255,255,255,0.75);
        }

        .glass-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(24px); 
            border-radius: 20px; 
            border: 1px solid var(--glass-border); 
            padding: 25px 20px;
            box-shadow: 0 12px 45px rgba(0, 0, 0, 0.18); 
            text-align: center; 
        }

        .upload-zone {
            border-radius: 14px; 
            padding: 18px 15px; 
            cursor: pointer;
            background: rgba(255, 255, 255, 0.28); 
            margin-bottom: 18px; 
            transition: 0.3s;
            border: 2px dashed var(--glass-border);
        }

        .format-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin: 14px 0; }
        .tag {
            font-size: 10px; background: rgba(255,255,255,0.6); color: #e80860;
            padding: 4px 9px; border-radius: 6px; font-weight: 600;
        }

        .upload-info-text { font-size: 14.5px; font-weight: 600; color: #222; margin-bottom: 10px; }

        .btn {
            background: var(--accent-color); color: white; border: none; padding: 14px;
            border-radius: 10px; cursor: pointer; font-weight: 700; width: 100%; font-size: 16px;
        }

        #progressSection, #resultSection { display: none; margin-top: 18px; }
        .progress-bar { background: rgba(0,0,0,0.12); height: 8px; border-radius: 4px; overflow: hidden; margin: 12px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent-color); transition: 0.3s; }

        .input-group {
            display: flex; background: rgba(255,255,255,0.65); border: 1px solid var(--glass-border); 
            border-radius: 10px; padding: 6px; margin-top: 12px;
        }
        .input-group input { flex: 1; background: transparent; border: none; padding: 10px; font-size: 14px; outline: none; color: #222; }
        .btn-copy { background: var(--accent-color); color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; }

        .music-player { position: fixed; bottom: 35px; right: 25px; z-index: 10; }
        .music-btn {
            width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.4);
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5);
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-size: 24px;
        }
        .music-btn.playing { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body onclick="handleFirstClick()">

    <canvas id="sakuraCanvas"></canvas>

    <div class="main-layer">
        <div class="page-title">Eternity直连托管</div>
        <img class="avatar-img" src="https://qu.ax/1vpRg.jpg" alt="Eternity Cat">

        <div class="glass-card">
            <div id="uploadForm">
                <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-info-text">点击或拖拽上传任何文件</div>
                    <div class="format-list">
                        <span class="tag">MP4</span><span class="tag">M3U8</span><span class="tag">MKV</span><span class="tag">MOV</span><span class="tag">AVI</span><span class="tag">FLV</span><span class="tag">WMV</span>
                        <span class="tag">MP3</span><span class="tag">WAV</span><span class="tag">FLAC</span><span class="tag">OGG</span><span class="tag">M4A</span><span class="tag">AAC</span><span class="tag">APE</span>
                        <span class="tag">JPG</span><span class="tag">PNG</span><span class="tag">GIF</span><span class="tag">WEBP</span><span class="tag">BMP</span><span class="tag">SVG</span><span class="tag">ICO</span>
                        <span class="tag">ZIP</span><span class="tag">7Z</span><span class="tag">RAR</span><span class="tag">TAR</span><span class="tag">GZ</span><span class="tag">ISO</span><span class="tag">DMG</span>
                        <span class="tag">APK</span><span class="tag">IPA</span><span class="tag">EXE</span><span class="tag">PDF</span><span class="tag">TXT</span><span class="tag">JSON</span><span class="tag">XML</span><span class="tag">DOCX</span>
                    </div>
                    <p style="font-size: 11.5px; color: #444; margin-top: 8px;">☁️ 永久储存 · 📦 256MB内 · ⚡ 智能直链</p>
                    <input type="file" id="fileInput" hidden>
                </div>
                <button class="btn" onclick="document.getElementById('fileInput').click()">立即上传文件</button>
            </div>

            <div id="progressSection">
                <p style="font-size: 14px; font-weight: bold;">🚀 正在同步至云端...</p>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <p id="percentText" style="font-size: 12px; color: #e80860;">准备中...</p>
            </div>

            <div id="resultSection">
                <div style="text-align: left;">
                    <span style="font-size: 12px; font-weight: bold; color: #555;">✅ 复制链接导入软件会自动识别</span>
                    <div class="input-group">
                        <input type="text" id="rawLink" readonly>
                        <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                    </div>
                </div>
                <p style="font-size: 11px; color: #888; margin-top: 18px;">关注TG频道：https://t.me/stymei</p>
                <button class="btn" style="background:none; border:1px solid #e80860; color:#e80860; margin-top: 15px;" onclick="location.reload()">继续上传</button>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-btn" id="musicBtn">🎵</div>
    </div>
    <audio id="bgMusic" loop src="https://files.catbox.moe/89l1hc.flac"></audio>

    <script>
        // 樱花雨 + 音乐 + 上传功能
        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * -height * 0.7;
                this.size = Math.random() * 11 + 7;
                this.speed = Math.random() * 1.5 + 0.8;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = Math.random() * 0.035 - 0.017;
                this.opacity = Math.random() * 0.7 + 0.45;
                this.swing = Math.random() * 25 + 10;
                this.swingSpeed = Math.random() * 0.025 + 0.01;
                this.rotationOffset = Math.random() * Math.PI;
            }
            update() {
                this.y += this.speed;
                this.angle += this.angleSpeed;
                this.x += Math.sin(this.angle) * this.swingSpeed * this.swing;
                if (this.y > height + 40) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle + this.rotationOffset);

                ctx.fillStyle = '#ff99cc';
                ctx.strokeStyle = '#ff77aa';
                ctx.lineWidth = 0.8;

                ctx.beginPath();
                ctx.moveTo(0, -this.size * 0.9);
                ctx.bezierCurveTo(-this.size * 0.55, -this.size * 0.4, -this.size * 0.7, this.size * 0.2, 0, this.size * 0.75);
                ctx.bezierCurveTo(this.size * 0.7, this.size * 0.2, this.size * 0.55, -this.size * 0.4, 0, -this.size * 0.9);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        const petals = [];
        for (let i = 0; i < 100; i++) petals.push(new Petal());

        function animateSakura() {
            ctx.clearRect(0, 0, width, height);
            petals.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateSakura);
        }
        animateSakura();

        // 音乐
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        let hasInteracted = false;

        function handleFirstClick() {
            if (!hasInteracted) {
                bgMusic.play().then(() => {
                    musicBtn.classList.add('playing');
                    hasInteracted = true;
                }).catch(() => {});
            }
        }

        musicBtn.onclick = (e) => {
            e.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.classList.add('playing');
            } else {
                bgMusic.pause();
                musicBtn.classList.remove('playing');
            }
        };

        // 上传
        const fileInput = document.getElementById('fileInput');
        const WORKER_URL = 'https://cloud.jsnzkpg.ccwu.cc/upload';

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';

            const fd = new FormData();
            fd.append('files[]', file);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', WORKER_URL, true);

            xhr.upload.onprogress = (ev) => {
                const percent = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('progressBar').style.width = percent + '%';
                document.getElementById('percentText').innerText = `上传进度：${percent}%`;
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    document.getElementById('rawLink').value = xhr.responseText.trim();
                    document.getElementById('progressSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                } else {
                    alert('上传失败');
                    location.reload();
                }
            };
            xhr.send(fd);
        };

        function copyValue(id, btn) {
            const input = document.getElementById(id);
            navigator.clipboard.writeText(input.value).then(() => {
                btn.innerText = '已复制';
                setTimeout(() => btn.innerText = '复制', 1500);
            });
        }
    </script>
</body>
</html>
