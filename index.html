<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternity 永久直链托管</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --accent-color: #4a6cf7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; }

        body {
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            overflow-x: hidden;
            padding: 15px; 
            padding-top: 8vh;
            color: #333;
        }

        .background-layer { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -2; 
        }
        .background-video { 
            width: 100%; height: 100%; 
            object-fit: cover; 
        }
        .background-overlay {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.55); 
            z-index: -1;
        }

        .marquee-container {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(12px); 
            padding: 8px 0; 
            border-bottom: 1px solid var(--glass-border); 
            z-index: 100;
        }
        .marquee { 
            white-space: nowrap; 
            display: inline-block; 
            animation: marquee 25s linear infinite; 
            font-weight: bold;
        }
        .marquee a { 
            color: #222; 
            text-decoration: none; 
            padding: 0 20px; 
            font-size: 14.5px; 
        }
        @keyframes marquee { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-100%); } 
        }

        .main-layer { 
            width: 100%; 
            max-width: 460px; 
        }
        .page-title {
            text-align: center; 
            font-size: 31px; 
            font-weight: 700; 
            margin-bottom: 12px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #feca57);
            background-size: 400% 400%; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            animation: gradient 8s ease infinite;
        }
        @keyframes gradient { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }

        .avatar-img {
            width: 96px; 
            height: 96px; 
            border-radius: 50%; 
            object-fit: cover;
            display: block; 
            margin: 0 auto 20px; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .glass-card {
            background: var(--glass-bg); 
            backdrop-filter: blur(16px); 
            border-radius: 16px; 
            border: 1px solid var(--glass-border); 
            padding: 28px;
            box-shadow: var(--glass-shadow); 
            text-align: center; 
        }

        .upload-zone {
            border-radius: 14px; 
            padding: 35px 20px; 
            cursor: pointer;
            background: rgba(255, 255, 255, 0.25); 
            margin-bottom: 18px; 
            transition: 0.3s;
            border: 2px dashed var(--glass-border);
        }
        .upload-zone:hover { 
            background: rgba(255, 255, 255, 0.35); 
            border-color: var(--accent-color);
        }

        .btn {
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 14px;
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600; 
            width: 100%; 
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.97); }

        #progressSection, #resultSection { display: none; margin-top: 20px; }
        .progress-bar { 
            background: rgba(0,0,0,0.1); 
            height: 8px; 
            border-radius: 4px; 
            overflow: hidden; 
            margin: 12px 0; 
        }
        .progress-fill { 
            width: 0%; 
            height: 100%; 
            background: linear-gradient(90deg, #4a6cf7, #00d2ff); 
            transition: width 0.3s; 
        }

        .result-item { text-align: left; margin-bottom: 16px; }
        .label { 
            font-size: 12px; 
            color: #555; 
            font-weight: bold; 
            margin-bottom: 5px; 
        }
        .input-group {
            display: flex; 
            background: rgba(255,255,255,0.5); 
            border: 1px solid var(--glass-border); 
            border-radius: 8px; 
            padding: 4px;
        }
        .input-group input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            padding: 10px 12px; 
            font-size: 13px; 
            outline: none; 
            color: #222; 
        }
        .btn-copy { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 0 16px; 
            border-radius: 6px; 
            font-size: 13px; 
            cursor: pointer; 
        }

        .userhash-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .userhash-group label {
            font-size: 13px;
            color: #555;
            display: block;
            margin-bottom: 6px;
        }
        .userhash-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .userhash-group small {
            color: #666;
            font-size: 12px;
            display: block;
            margin-top: 4px;
        }

        .proxy-group {
            margin: 15px 0;
            text-align: left;
        }
        .proxy-group label {
            font-size: 13px;
            color: #555;
        }

        .music-player { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            z-index: 1000; 
        }
        .music-toggle {
            width: 48px; 
            height: 48px; 
            border-radius: 50%; 
            background: var(--glass-bg);
            backdrop-filter: blur(12px); 
            border: 1px solid var(--glass-border);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .music-toggle.playing { 
            animation: rotate 3.5s linear infinite; 
        }
        @keyframes rotate { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div class="background-layer">
        <video class="background-video" autoplay muted loop playsinline>
            <source src="https://txmov2.a.kwimgs.com/upic/2023/10/13/16/BMjAyMzEwMTMxNjU4MTJfMTcyNTc4NzU4N18xMTQ4OTQ2OTgxMzRfMl8z_b_B209e890a596d64fbd174507b758b0815.mp4" type="video/mp4">
        </video>
        <div class="background-overlay"></div>
    </div>

    <div class="marquee-container">
        <div class="marquee">
            <a href="https://kelayun.notepin.co" target="_blank">白嫖就是如此简单</a>
        </div>
    </div>

    <div class="main-layer">
        <div class="page-title">Eternity 永久直链托管</div>
        <img class="avatar-img" src="https://i.imgant.com/v2/xxKwQwD.jpeg" alt="Eternity">

        <div class="glass-card">
            
            <!-- UserHash 输入框 -->
            <div class="userhash-group">
                <label>🔑 Catbox UserHash（必填）</label>
                <input type="text" id="userHashInput" placeholder="在此粘贴你的 userhash" value="">
                <small>登录 <a href="https://catbox.moe/user/manage.php" target="_blank" style="color:#4a6cf7;">https://catbox.moe/user/manage.php</a> 复制 userhash</small>
            </div>

            <!-- 新增：代理开关 -->
            <div class="proxy-group">
                <label>
                    <input type="checkbox" id="useProxy" checked> 
                    使用 CORS 代理（推荐在中国大陆网络下勾选）
                </label>
            </div>

            <div id="uploadForm">
                <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div style="font-size: 48px; margin-bottom: 12px;">📤</div>
                    <p style="font-size: 15px; font-weight: 600;">点击或拖拽文件上传</p>
                    <div class="upload-info">
                        支持任意格式 · 单文件 ≤ 200MB<br>
                        永久储存 · 多镜像加速
                    </div>
                    <input type="file" id="fileInput" hidden>
                </div>
                <button class="btn" onclick="document.getElementById('fileInput').click()">立即上传文件</button>
            </div>

            <div id="progressSection">
                <p style="font-size: 13px; margin-bottom: 8px;">正在上传至 Catbox...</p>
                <div class="progress-bar"><div class="progress-fill" id="progressBar"></div></div>
                <p id="percentText" style="font-size: 13px; color: var(--accent-color);">0% — 准备中</p>
            </div>

            <div id="resultSection">
                <div class="result-item">
                    <span class="label">🚀 镜像加速链接（推荐）</span>
                    <div class="input-group">
                        <input type="text" id="proxyLink" readonly>
                        <button class="btn-copy" onclick="copyValue('proxyLink', this)">复制</button>
                    </div>
                </div>
                <div class="result-item">
                    <span class="label">🔗 原始官方链接</span>
                    <div class="input-group">
                        <input type="text" id="rawLink" readonly>
                        <button class="btn-copy" onclick="copyValue('rawLink', this)">复制</button>
                    </div>
                </div>
                <button class="btn" style="background:transparent; border:1px solid #4a6cf7; color:#4a6cf7; margin-top:15px;" onclick="location.reload()">上传新文件</button>
            </div>
        </div>
    </div>

    <div class="music-player">
        <div class="music-toggle" id="musicToggle"></div>
    </div>
    <audio id="bgMusic" loop preload="auto" src="https://mpimg.cn/view.php/ac863e4b37bd7eb8388e97f15aed64dc.mp3"></audio>

    <script>
        // 音乐控制
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');

        function tryPlayMusic() {
            bgMusic.play().catch(() => {});
            musicToggle.classList.add('playing');
        }

        musicToggle.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                musicToggle.classList.add('playing');
            } else {
                bgMusic.pause();
                musicToggle.classList.remove('playing');
            }
        });

        window.addEventListener('load', () => {
            setTimeout(tryPlayMusic, 800);
            const savedHash = localStorage.getItem('catboxUserHash');
            if (savedHash) document.getElementById('userHashInput').value = savedHash;
        });

        // ==================== 配置 ====================
        const API_URL = 'https://catbox.moe/user/api.php';
        const PROXY_GATEWAY = 'https://proxy.api.030101.xyz/';   // 你的镜像加速保持不变

        const CORS_PROXIES = [
            'https://corsproxy.io/?',           // 新换的主代理（推荐）
            'https://proxy.corsfix.com/?'       // 备用
        ];

        let currentProxyIndex = 0;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // 拖拽支持
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); });
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) handleUpload(files[0]);
        });

        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) handleUpload(e.target.files[0]);
        };

        function buildMirrorWithProxy(originalUrl) {
            if (!originalUrl) return '';
            let cleanUrl = originalUrl.replace(/^https?:\/\//, '');
            return PROXY_GATEWAY + cleanUrl;
        }

        // ==================== 上传核心函数 ====================
        function handleUpload(file) {
            if (file.size > 200 * 1024 * 1024) {
                alert('文件超过 200MB 限制！');
                return;
            }

            const userHash = document.getElementById('userHashInput').value.trim();
            if (!userHash) {
                alert('请先填写你的 Catbox UserHash！');
                return;
            }
            localStorage.setItem('catboxUserHash', userHash);

            const useProxy = document.getElementById('useProxy').checked;

            document.getElementById('uploadForm').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('percentText').innerHTML = '准备上传...';

            const fd = new FormData();
            fd.append('reqtype', 'fileupload');
            fd.append('userhash', userHash);
            fd.append('fileToUpload', file);

            let targetUrl = API_URL;

            if (useProxy) {
                const proxy = CORS_PROXIES[currentProxyIndex];
                targetUrl = proxy + encodeURIComponent(API_URL);
                console.log('使用代理:', proxy);
            }

            const xhr = new XMLHttpRequest();
            xhr.open('POST', targetUrl, true);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    document.getElementById('progressBar').style.width = percent + '%';
                    document.getElementById('percentText').innerHTML = `上传进度: ${percent}%`;
                }
            };

            xhr.onload = () => {
                const response = xhr.responseText.trim();

                if (xhr.status === 200 && response.startsWith('http')) {
                    document.getElementById('rawLink').value = response;
                    document.getElementById('proxyLink').value = buildMirrorWithProxy(response);
                    document.getElementById('progressSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                } else {
                    let errMsg = response || `HTTP ${xhr.status}`;
                    if (errMsg.includes('Anonymous')) errMsg = '匿名上传已被禁用，请确认 UserHash 正确！';
                    alert('上传失败：\n' + errMsg + '\n\n如果一直失败，请尝试关闭“使用 CORS 代理”开关后重试');
                    console.error('返回内容:', response);
                    setTimeout(() => location.reload(), 2500);
                }
            };

            xhr.onerror = () => {
                alert('网络请求失败。\n\n建议：关闭“使用 CORS 代理”开关试试（如果你
